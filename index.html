<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKBXOB Centered</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1e1e1e; /* VSCode dark theme */
            color: transparent; /* Make text transparent */
            font-family: 'Courier New', Courier, monospace; /* Terminal-like font */
            font-size: 5rem; /* Adjust size as needed */
            position: relative;
        }

        .text {
            background: linear-gradient(90deg, black, aqua, white);
            -webkit-background-clip: text;
            background-clip: text;
            animation: gradientAnimation 5s ease infinite;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>
    <div class="text">LKBXOB</div>
</body>
</html>
